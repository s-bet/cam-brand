  <line
     x1="34.452103"
     y1="160"
     x2="82.452103"
     y2="160"
     stroke="#22d3ee"
     stroke-width="20"
     stroke-linecap="round"
     id="line5" />
  <line
     x1="237.54785"
     y1="160"
     x2="285.54785"
     y2="160"
     stroke="#22d3ee"
     stroke-width="20"
     stroke-linecap="round"
     id="line6" />
  <!-- Segmentos diagonais (escala ×8) -->
  <line
     x1="69.6"
     y1="69.6"
     x2="103.2"
     y2="103.2"
     stroke="#3b82f6"
     stroke-width="16"
     stroke-linecap="round"
     id="line7" />
  <line
