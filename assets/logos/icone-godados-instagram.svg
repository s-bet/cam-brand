  <circle
     cx="160"
     cy="160"
     r="32"
     fill="url(#gradiente-central)"
     id="circle3" />
  <!-- Segmentos cardinais (escala ×8) -->
  <line
     x1="160"
     y1="34.452103"
     x2="160"
     y2="82.452103"
     stroke="#22d3ee"
     stroke-width="20"
