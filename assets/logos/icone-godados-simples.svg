<?xml version="1.0" encoding="UTF-8"?>
<!-- GoDados.cam — Ícone Simples 40×40 | Uso: nav, cabeçalho, tamanhos pequenos -->
<!-- Variante sem segmentos diagonais — 4 riscos cardinais + anel + ponto central -->
<!-- Fonte: index.html <nav> linha 133 -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="40" height="40"
  viewBox="0 0 40 40"
  fill="none"
  role="img"
  aria-label="GoDados.cam"
>
  <title>GoDados.cam</title>

  <!-- Anel externo -->
  <circle cx="20" cy="20" r="16" fill="none" stroke="#06b6d4" stroke-width="2"/>

  <!-- Ponto central -->
  <circle cx="20" cy="20" r="4" fill="#06b6d4"/>

  <!-- Segmentos cardinais (apenas os 4 eixos, sem diagonais) -->
  <line x1="20" y1="4"  x2="20" y2="10" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="30" x2="20" y2="36" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="4"  y1="20" x2="10" y2="20" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="20" x2="36" y2="20" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
</svg>
