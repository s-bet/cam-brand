<?xml version="1.0" encoding="UTF-8"?>
<!-- GoDados.cam — Logo Dark | Uso: fundos escuros (#0f1f35, #1a3358) -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="320" height="80"
  viewBox="0 0 160 40"
  fill="none"
  role="img"
  aria-label="GoDados.cam"
>
  <title>GoDados.cam</title>

  <!-- Ícone: íris/câmera — variante cyan sobre escuro -->
  <circle cx="20" cy="20" r="16" fill="none" stroke="#06b6d4" stroke-width="2"/>
  <circle cx="20" cy="20" r="8"  fill="#06b6d4" opacity="0.18"/>
  <circle cx="20" cy="20" r="4"  fill="#06b6d4"/>

  <!-- Segmentos cardinais -->
  <line x1="20" y1="4"  x2="20" y2="10" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="30" x2="20" y2="36" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="4"  y1="20" x2="10" y2="20" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="20" x2="36" y2="20" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Segmentos diagonais -->
  <line x1="8.7"  y1="8.7"  x2="12.9" y2="12.9" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="27.1" y1="27.1" x2="31.3" y2="31.3" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="31.3" y1="8.7"  x2="27.1" y2="12.9" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="12.9" y1="27.1" x2="8.7"  y2="31.3" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>

  <!-- Wordmark — branco sobre escuro, .cam em cyan -->
  <text x="46"  y="25" font-family="'Geist','Inter',sans-serif" font-size="18" font-weight="700" fill="#ffffff">Go</text>
  <text x="66"  y="25" font-family="'Geist','Inter',sans-serif" font-size="18" font-weight="700" fill="#ffffff">Dados</text>
  <text x="122" y="25" font-family="'Geist','Inter',sans-serif" font-size="18" font-weight="700" fill="#06b6d4">.cam</text>
</svg>
