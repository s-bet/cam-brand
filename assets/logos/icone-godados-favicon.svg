<?xml version="1.0" encoding="UTF-8"?>
<!-- GoDados.cam — Favicon / Ícone Mínimo | Uso: favicon, 16px, 32px, tamanhos muito pequenos -->
<!-- Variante ultra-minimal: só o anel externo + ponto central — legível em 16px -->
<!-- Fonte: index.html <link rel="icon"> linha 20 -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="40" height="40"
  viewBox="0 0 40 40"
  fill="none"
  role="img"
  aria-label="GoDados.cam"
>
  <title>GoDados.cam</title>

  <!-- Anel externo -->
  <circle cx="20" cy="20" r="16" fill="none" stroke="#06b6d4" stroke-width="2"/>

  <!-- Ponto central -->
  <circle cx="20" cy="20" r="4" fill="#06b6d4"/>
</svg>
